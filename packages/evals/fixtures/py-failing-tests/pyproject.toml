[project]
name = "calculator"
version = "0.0.1"
description = "Open-Apex fixture: seeded failing pytest."
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/calculator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
